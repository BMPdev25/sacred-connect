appId: host.exp.exponent
---
# Pre-requisite: A Devotee booking is accepted by Priest (Status: Confirmed & Pending Payment)
- launchApp
- tapOn:
    id: "identifier-input"
- inputText: "1234567890" # Devotee Phone
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"

# Wait for Login API and Dashboard Redirection
- assertVisible: "Explore" # Tab bar

# Navigate to Bookings
- tapOn: "Bookings"
- tapOn: "Upcoming" # Ensure we are on the upcoming tab

# Open the specific confirmed booking
- extendedWaitUntil:
    visible: "Ganesh Puja"
    timeout: 10000
- tapOn: "Ganesh Puja"

# Verify Booking is Confirmed but Unpaid
- assertVisible: "Status: Confirmed"
- assertVisible: "Pay Advance"
- tapOn: "Pay Advance"

# Mock Payment Gateway Steps (Assuming a Webview or native SDK popup)
- extendedWaitUntil:
    visible: "Razorpay" # Or Stripe
    timeout: 10000
- tapOn: "Success" # Simulating tapping the test 'Success' button on the mock gateway

# Verify we return to the app with a Success UI
- extendedWaitUntil:
    visible: "Payment Successful"
    timeout: 15000
- tapOn: "View Booking"

# Verify Final State
- assertVisible: "Status: Paid"
