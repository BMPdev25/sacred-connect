appId: host.exp.exponent # Expo Go bundle ID
---
# Pre-requisite: A Devotee booking is accepted and paid for
- launchApp
- tapOn:
    id: "identifier-input"
- inputText: "9876543210" # Priest Phone
- tapOn:
    id: "password-input"
- inputText: "password123"
- tapOn:
    id: "login-button"

# Wait for Login API and Dashboard Redirection
- assertVisible: "Dashboard" # Priest Home Header

# Navigate to Bookings
- tapOn: "Bookings"
- tapOn: "Upcoming"

# Open the specific confirmed booking
- extendedWaitUntil:
    visible: "Ganesh Puja"
    timeout: 10000
- tapOn: "Ganesh Puja"

# Trigger Cancellation
- assertVisible: "Cancel Booking"
- tapOn: "Cancel Booking"

# Assert Penalty Warning Modal
- assertVisible: "Warning"
- assertVisible: "You may be penalized"
- tapOn: "Confirm Cancel"

# Verify Success and redirection back to bookings
- extendedWaitUntil:
    visible: "Upcoming"
    timeout: 10000
- assertNotVisible: "Ganesh Puja" # Should disappear from Upcoming
